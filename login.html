<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | neoShop</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="icon" href="/assets/icons/isotipoSinFondoNeoShop512.png" type="image/png">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">


    <link rel="stylesheet" href="login.css">
</head>

<body>
    <!-- MODAL LOGIN -->
    <div class="login-card">
        <i class="fas fa-store"></i>
        <h2>Iniciar sesión</h2>
        <form id="loginForm">
            <input type="email" id="loginUser" placeholder="Correo electrónico" required>
            <input type="password" id="loginPass" placeholder="Contraseña" required>
            <button type="submit" class="btn">Ingresar <i class="fas fa-arrow-right"></i></button>
        </form>
        <div class="login-links">
            <a href="#">¿Olvidaste tu contraseña?</a>
            <p>¿No tienes cuenta?
                <span id="goRegister">Registrate</span>
            </p>
        </div>
    </div>




    <script src="login.js"></script>

</body>

</html>
