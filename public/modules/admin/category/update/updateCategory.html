<!-- FILE: updateCategory.html -->
<div class="credContainer">
    <div class="category-list-container">
        <div class="category-list-card">
            <!-- HEADER -->
            <div class="page-header">
                <h2 class="header-title">
                    <i class="fas fa-edit"></i> Editar Categoría
                </h2>
                <div class="header-actions">
                    <a href="/categorias" class="btn btn-primary" id="backToListBtn" data-link>
                        <i class="fas fa-arrow-left"></i> Volver al listado
                    </a>
                </div>
            </div>

            <!-- Formulario -->
            <div class="category-form-wrapper">
                <div class="category-card">
                    <!-- ID oculto -->
                    <input type="hidden" id="categoryId">

                    <form id="categoryForm">
                        <!-- Nombre de la categoría -->
                        <div class="form-group">
                            <label for="name">
                                <i class="fas fa-tag"></i> Nombre de la categoría <span class="required">*</span>
                            </label>
                            <input type="text" id="name" name="name" placeholder="Ej: Electrónicos, Ropa, Calzado..."
                                required maxlength="50">
                            <small class="field-note">Mínimo 2 caracteres, máximo 50</small>
                        </div>

                        <!-- Descripción -->
                        <div class="form-group">
                            <label for="description">
                                <i class="fas fa-align-left"></i> Descripción
                            </label>
                            <textarea id="description" name="description" rows="3"
                                placeholder="Descripción detallada de la categoría..."></textarea>
                            <small class="field-note">Opcional. Describe qué productos pertenecen a esta
                                categoría</small>
                        </div>

                        <!-- Estado -->
                        <div class="form-group">
                            <label><i class="fas fa-toggle-on"></i> Estado de la categoría</label>
                            <div class="status-toggle-wrapper">
                                <span class="status-label" id="statusLabelInactive">Inactivo</span>
                                <div class="status-filter-switch" id="statusToggle">
                                    <div class="status-filter-slider"></div>
                                </div>
                                <span class="status-label active" id="statusLabelActive">Activo</span>
                            </div>
                            <small class="field-note">Cambia el estado para habilitar o deshabilitar la
                                categoría</small>
                        </div>

                        <!-- Botones de acción -->
                        <div class="form-actions">
                            <button type="button" id="cancelBtn" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancelar
                            </button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Actualizar categoría
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
