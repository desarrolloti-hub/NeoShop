<!-- ========================================
   DRIVERS - CONTROLADORES PARA IMPRESORAS POS
   Panel de descarga de drivers por marca
   ======================================== -->

<div class="credContainer">
    <!-- HEADER -->
    <div class="page-header">
        <h2 class="header-title">
            <i class="fas fa-print"></i> Controladores para Impresoras
        </h2>
        <p class="header-subtitle" style="color: var(--text-muted); font-size: var(--font-size-sm); margin: 0;">
            Selecciona tu marca para descargar el driver
        </p>
    </div>

    <!-- LISTA DE DRIVERS -->
    <div class="drivers-grid">

        <!-- EPSON -->
        <button class="driver-btn" 
                data-url="https://support.epson.net/setupnavi/?PINF=swlist&OSC=MI&LG2=EN&MKN=TM-T20" 
                data-brand="EPSON">
            <i class="fas fa-print driver-icon" style="color: #004080;"></i>
            <div class="driver-content">
                <span class="driver-title">EPSON</span>
                <span class="driver-desc">TM-T20, TM-T88 (Serie TM-T)</span>
            </div>
            <i class="fas fa-external-link-alt driver-arrow"></i>
        </button>

        <!-- BIXOLON -->
        <button class="driver-btn" 
                data-url="http://www.bixolon.com" 
                data-brand="BIXOLON">
            <i class="fas fa-print driver-icon" style="color: #00529b;"></i>
            <div class="driver-content">
                <span class="driver-title">BIXOLON</span>
                <span class="driver-desc">SRP-330, SRP-350</span>
            </div>
            <i class="fas fa-external-link-alt driver-arrow"></i>
        </button>

        <!-- EC LINE -->
        <button class="driver-btn" 
                data-url="https://ec-line.manymanuals-pt.com/pos-mobile-printers" 
                data-brand="EC LINE">
            <i class="fas fa-print driver-icon" style="color: #1a7a3a;"></i>
            <div class="driver-content">
                <span class="driver-title">EC LINE</span>
                <span class="driver-desc">EC-80320</span>
            </div>
            <i class="fas fa-external-link-alt driver-arrow"></i>
        </button>

        <!-- GHIA -->
        <button class="driver-btn" 
                data-url="https://www.ghia.com.mx/" 
                data-brand="GHIA">
            <i class="fas fa-print driver-icon" style="color: #c8102e;"></i>
            <div class="driver-content">
                <span class="driver-title">GHIA</span>
                <span class="driver-desc">Térmicas 58mm y 80mm</span>
            </div>
            <i class="fas fa-external-link-alt driver-arrow"></i>
        </button>

        <!-- TECHZONE POS -->
        <button class="driver-btn" 
                data-url="https://diten.mx/impresion/impresoras/Impresora-de-Tickets-TechZone-TZBE102-Termica-200-mm-s-80-mm-USB-RJ-11-Serial-Ethernet-TZBE102" 
                data-brand="TECHZONE POS">
            <i class="fas fa-print driver-icon" style="color: #f58220;"></i>
            <div class="driver-content">
                <span class="driver-title">TECHZONE POS</span>
                <span class="driver-desc">USB / Serial / Ethernet</span>
            </div>
            <i class="fas fa-external-link-alt driver-arrow"></i>
        </button>

        <!-- 3NSTAR -->
        <button class="driver-btn" 
                data-url="https://3nstar.com/printers-download/#content" 
                data-brand="3NSTAR">
            <i class="fas fa-print driver-icon" style="color: #003366;"></i>
            <div class="driver-content">
                <span class="driver-title">3NSTAR</span>
                <span class="driver-desc">RPT006, RPT008</span>
            </div>
            <i class="fas fa-external-link-alt driver-arrow"></i>
        </button>

        <!-- XPRINTER -->
        <button class="driver-btn" 
                data-url="https://www.bartendersoftware.com/resources/printer-drivers/xprinter" 
                data-brand="XPRINTER">
            <i class="fas fa-print driver-icon" style="color: #e30613;"></i>
            <div class="driver-content">
                <span class="driver-title">XPRINTER</span>
                <span class="driver-desc">Serie XP (58mm / 80mm genéricas)</span>
            </div>
            <i class="fas fa-external-link-alt driver-arrow"></i>
        </button>

        <!-- SKYTICKET -->
        <button class="driver-btn" 
                data-url="https://www.skyticket.com/" 
                data-brand="SKYTICKET">
            <i class="fas fa-print driver-icon" style="color: #0072b0;"></i>
            <div class="driver-content">
                <span class="driver-title">SKYTICKET</span>
                <span class="driver-desc">Varios modelos</span>
            </div>
            <i class="fas fa-external-link-alt driver-arrow"></i>
        </button>

        <!-- QIAN -->
        <button class="driver-btn" 
                data-url="https://www.qian.com/" 
                data-brand="QIAN">
            <i class="fas fa-print driver-icon" style="color: #ff6b00;"></i>
            <div class="driver-content">
                <span class="driver-title">QIAN</span>
                <span class="driver-desc">Portátiles inalámbricas</span>
            </div>
            <i class="fas fa-external-link-alt driver-arrow"></i>
        </button>

    </div>

    <!-- NOTA INFORMATIVA -->
    <div class="drivers-note">
        <i class="fas fa-info-circle"></i>
        <span>
            <strong>Nota:</strong> Los lectores de código de barras funcionan por <strong>Plug & Play</strong> 
            (USB HID / emulación de teclado) y no requieren controladores adicionales.
        </span>
    </div>
</div>
