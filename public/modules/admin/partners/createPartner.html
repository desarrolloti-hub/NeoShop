<div class="credContainer">
    <div class="page-header">
        <h2 class="header-title">
            <i class="fas fa-user-plus"></i> Registrar Colaborador
        </h2>
        <div class="header-actions">
            <a href="/colaboradores" class="btn-header btn-header-secondary" data-link>
                <i class="fas fa-arrow-left"></i> Volver al listado
            </a>
        </div>
    </div>
    <div class="partners-create-container">
        <div class="partner-create-form-container">
            <div class="partner-create-body">
                <form id="partnerCreateForm">
                    <div class="create-photo-section">
                        <div class="create-photo-preview" id="photoPreview">
                            <i class="fas fa-camera"></i>
                        </div>
                        <input type="file" id="photoInput" class="create-photo-input"
                            accept="image/jpeg,image/png,image/jpg,image/webp">
                        <button type="button" id="uploadPhotoBtn" class="btn-secondary btn-upload">
                            <i class="fas fa-upload"></i> Subir foto
                        </button>
                        <p class="photo-help">Opcional. Sube una foto para el colaborador</p>
                    </div>

                    <div class="create-form-row">
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email *</label>
                            <input type="email" id="email" required placeholder="correo@ejemplo.com">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Nombre completo *</label>
                            <input type="text" id="fullName" required placeholder="Juan Pérez González">
                        </div>
                    </div>

                    <div class="create-form-row">
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Teléfono</label>
                            <input type="tel" id="phone" placeholder="5512345678">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-id-card"></i> RFC</label>
                            <input type="text" id="rfc" placeholder="PEGJ880101ABC">
                        </div>
                    </div>

                    <div class="create-form-row">
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Contraseña</label>
                            <input type="text" id="password" placeholder="Mínimo 6 caracteres (opcional)">
                            <p class="field-help">Si no se proporciona, se generará una automáticamente</p>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-tag"></i> Rol</label>
                            <select id="role">
                                <option value="partner">Partner</option>
                            </select>
                        </div>
                    </div>

                    <div class="create-form-row">
                        <div class="form-group">
                            <label><i class="fas fa-key"></i> Permiso</label>
                            <select id="permissionId">
                                <option value="">Sin permiso especial</option>
                                <option value="inventory_access">Acceso a inventario</option>
                                <option value="orders_access">Acceso a pedidos</option>
                                <option value="reports_access">Acceso a reportes</option>
                                <option value="full_access">Acceso completo</option>
                            </select>
                        </div>
                    </div>

                    <div class="create-form-actions">
                        <button type="button" id="cancelCreateBtn" class="btn-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                        <button type="submit" id="submitCreateBtn" class="btn-primary">
                            <i class="fas fa-save"></i> Crear colaborador
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
