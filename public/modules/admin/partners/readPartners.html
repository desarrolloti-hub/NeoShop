<!-- FILE: readPartners.html -->
<div class="credContainer">
    <div class="partners-list-container">
        <!-- HEADER - Usa .page-header global -->
        <div class="page-header">
            <h2 class="header-title">
                <i class="fas fa-users"></i> Mis Colaboradores
            </h2>
            <div class="header-actions">
                <a href="/crearColaborador" class="btn btn-primary" id="createPartnerBtn" data-link>
                    <i class="fas fa-plus"></i> Nuevo colaborador
                </a>
            </div>
        </div>

        <!-- FILTROS -->
        <div class="partners-list-filters">
            <div class="filter-group">
                <label><i class="fas fa-search"></i> Buscar</label>
                <input type="text" id="searchInput" placeholder="Email, nombre o teléfono...">
            </div>
            <div class="filter-group">
                <label><i class="fas fa-filter"></i> Estado</label>
                <select id="statusFilter">
                    <option value="all">Todos</option>
                    <option value="active">Activos</option>
                    <option value="inactive">Inactivos</option>
                </select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-check-circle"></i> Verificación</label>
                <select id="verificationFilter">
                    <option value="all">Todos</option>
                    <option value="verified">Verificados</option>
                    <option value="unverified">No verificados</option>
                </select>
            </div>
            <div class="filter-actions">
                <button id="clearFiltersBtn" class="btn-secondary">
                    <i class="fas fa-eraser"></i> Limpiar
                </button>
            </div>
        </div>

        <!-- VISTA DESKTOP - TABLA con componente universal -->
        <div class="component-table-wrapper desktop-view">
            <table class="component-table">
                <thead>
                    <tr>
                        <th>Colaborador</th>
                        <th>Contacto</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="partnersTableBody">
                    <tr>
                        <td colspan="4" class="list-empty-state">
                            <i class="fas fa-users"></i>
                            <p>Cargando colaboradores...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- VISTA MOBILE - CARDS con componente universal -->
        <div id="partnersMobileCards" class="mobile-view">
            <!-- Las cards se renderizan dinámicamente -->
        </div>
    </div>
</div>
