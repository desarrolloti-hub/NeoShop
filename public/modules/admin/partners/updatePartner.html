<div class="credContainer">
    <div class="page-header">
        <h2 class="header-title">
            <i class="fas fa-edit"></i> Editar Colaborador
        </h2>
        <div class="header-actions">
            <a href="/colaboradores" class="btn-header btn-header-secondary" id="backToListBtn" data-link>
                <i class="fas fa-arrow-left"></i> Volver al listado
            </a>
        </div>
    </div>
    <div class="partners-edit-container">
        <div class="partner-edit-form-container">
            <div class="partner-edit-body">
                <form id="partnerEditForm">
                    <input type="hidden" id="editPartnerId">

                    <div class="edit-photo-section">
                        <div class="edit-photo-preview" id="editPhotoPreview">
                            <i class="fas fa-camera"></i>
                        </div>
                        <input type="file" id="editPhotoInput" class="edit-photo-input"
                            accept="image/jpeg,image/png,image/jpg,image/webp">
                        <div class="edit-photo-buttons">
                            <button type="button" id="editUploadPhotoBtn" class="btn-secondary btn-upload">
                                <i class="fas fa-upload"></i> Cambiar foto
                            </button>
                            <button type="button" id="removePhotoBtn" class="btn-danger">
                                <i class="fas fa-trash"></i> Eliminar foto
                            </button>
                        </div>
                        <p class="photo-help">Opcional. Puedes subir una foto o usar una URL</p>
                        <input type="text" id="editPhotoUrl" placeholder="O pega una URL de imagen aquí"
                            class="photo-url-input">
                    </div>

                    <div class="edit-form-row">
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email *</label>
                            <input type="email" id="editEmail" required placeholder="correo@ejemplo.com">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Nombre completo *</label>
                            <input type="text" id="editFullName" required placeholder="Juan Pérez González">
                        </div>
                    </div>

                    <div class="edit-form-row">
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Teléfono</label>
                            <input type="tel" id="editPhone" placeholder="5512345678">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-id-card"></i> RFC</label>
                            <input type="text" id="editRfc" placeholder="PEGJ880101ABC">
                        </div>
                    </div>

                    <div class="edit-form-row">
                        <div class="form-group">
                            <label><i class="fas fa-tag"></i> Rol</label>
                            <select id="editRole">
                                <option value="partner">Partner</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-key"></i> Permiso</label>
                            <select id="editPermissionId">
                                <option value="">Sin permiso especial</option>
                                <option value="inventory_access">Acceso a inventario</option>
                                <option value="orders_access">Acceso a pedidos</option>
                                <option value="reports_access">Acceso a reportes</option>
                                <option value="full_access">Acceso completo</option>
                            </select>
                        </div>
                    </div>

                    <div class="edit-form-row">
                        <div class="form-group">
                            <label><i class="fas fa-circle"></i> Estado</label>
                            <select id="editActive">
                                <option value="true">Activo</option>
                                <option value="false">Inactivo</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-check-circle"></i> Verificación</label>
                            <input type="text" id="editEmailVerified" readonly disabled
                                style="background: var(--bg-gray);">
                        </div>
                    </div>

                    <div class="edit-form-actions">
                        <button type="button" id="cancelEditBtn" class="btn-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                        <button type="submit" id="submitEditBtn" class="btn-primary">
                            <i class="fas fa-save"></i> Guardar cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
