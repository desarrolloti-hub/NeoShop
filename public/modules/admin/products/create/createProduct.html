<!-- FILE: createProduct.html -->
<div class="credContainer">
    <div class="product-list-container">
        <div class="product-list-card">
            <!-- HEADER USANDO COMPONENTE page-header -->
            <div class="page-header">
                <h2 class="header-title">
                    <i class="fas fa-box"></i> Registrar Producto
                </h2>
                <div class="header-actions">
                    <a href="/productos" class="btn btn-primary" id="backToListBtn" data-link>
                        <i class="fas fa-arrow-left"></i> Volver al listado
                    </a>
                </div>
            </div>

            <!-- Formulario -->
            <div class="product-form-wrapper">
                <div class="product-card">
                    <!-- Contenedor para imagen del producto -->
                    <div class="avatar-wrapper" id="productImageWrapper" style="cursor: pointer;">
                        <div class="avatar-circle" id="productAvatarCircle">
                            <i class="fas fa-box" id="productAvatarIcon"></i>
                            <img id="productAvatarPreview" alt="Imagen del producto"
                                style="display: none; width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                        </div>
                        <div class="avatar-overlay">
                            <i class="fas fa-camera"></i>
                            <span class="avatar-hint">Haz clic para subir imagen</span>
                        </div>
                    </div>

                    <p class="avatar-guide">
                        <i class="fas fa-info-circle"></i> Sube una imagen del producto (opcional)
                    </p>

                    <input type="file" id="productImageInput" accept="image/*" style="display: none;">

                    <button type="button" id="removeProductImageBtn" style="display: none;">
                        <i class="fas fa-trash"></i> Eliminar imagen
                    </button>

                    <form id="productForm">
                        <!-- Información básica -->
                        <div class="form-group">
                            <label for="name">
                                <i class="fas fa-tag"></i> Nombre del producto <span class="required">*</span>
                            </label>
                            <input type="text" id="name" name="name" placeholder="Ej: Camisa Oxford" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="barcode">
                                    <i class="fas fa-barcode"></i> Código de barras <span class="required">*</span>
                                </label>
                                <input type="text" id="barcode" name="barcode" placeholder="Código único" required>
                            </div>
                            <div class="form-group">
                                <label for="brand">
                                    <i class="fas fa-building"></i> Marca <span class="required">*</span>
                                </label>
                                <input type="text" id="brand" name="brand" placeholder="Ej: Nike, Adidas" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="description">
                                <i class="fas fa-align-left"></i> Descripción
                            </label>
                            <textarea id="description" name="description" rows="3"
                                placeholder="Descripción detallada del producto..."></textarea>
                        </div>

                        <!-- Precios -->
                        <div class="section-divider">
                            <span>Precios</span>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="price">
                                    <i class="fas fa-dollar-sign"></i> Precio de venta <span class="required">*</span>
                                </label>
                                <div class="input-with-icon">
                                    <span class="input-prefix">$</span>
                                    <input type="number" id="price" name="price" placeholder="0.00" step="0.01"
                                        required>
                                </div>
                                <small class="field-note">Precio que verá el cliente</small>
                            </div>
                            <div class="form-group">
                                <label for="cost">
                                    <i class="fas fa-chart-line"></i> Costo de compra
                                </label>
                                <div class="input-with-icon">
                                    <span class="input-prefix">$</span>
                                    <input type="number" id="cost" name="cost" placeholder="0.00" step="0.01">
                                </div>
                                <small class="field-note">Tu costo de adquisición</small>
                            </div>
                        </div>

                        <!-- Inventario -->
                        <div class="section-divider">
                            <span>Inventario</span>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="stock">
                                    <i class="fas fa-boxes"></i> Stock inicial
                                </label>
                                <input type="number" id="stock" name="stock" placeholder="0" value="0">
                                <small class="field-note">Cantidad disponible en inventario</small>
                            </div>
                            <div class="form-group">
                                <label for="minStock">
                                    <i class="fas fa-exclamation-triangle"></i> Stock mínimo
                                </label>
                                <input type="number" id="minStock" name="minStock" placeholder="0" value="0">
                                <small class="field-note">Alerta cuando el stock baje de este número</small>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="unitOfMeasure">
                                <i class="fas fa-ruler"></i> Unidad de medida
                            </label>
                            <input type="text" id="unitOfMeasure" name="unitOfMeasure"
                                placeholder="Ej: pieza, kg, litro, par">
                            <small class="field-note">Ej: pieza, kilogramo, litro, par</small>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Registrar producto
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
