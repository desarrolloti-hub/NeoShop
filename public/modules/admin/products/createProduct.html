<!-- FILE: createProduct.html -->
<div class="credContainer">
    <div class="product-list-container">
        <div class="product-list-card">
            <!-- HEADER -->
            <div class="page-header">
                <h2 class="header-title">
                    <i class="fas fa-box"></i> Registrar Producto
                </h2>
                <div class="header-actions">
                    <a href="/productos" class="btn-header btn-header-secondary" id="backToListBtn" data-link>
                        <i class="fas fa-arrow-left"></i> Volver al listado
                    </a>
                </div>
            </div>

            <!-- Formulario -->
            <div class="product-form-wrapper">
                <div class="product-card">
                    <!-- SECCIÓN: IMAGEN -->
                    <div class="image-section">
                        <div class="image-upload-area">
                            <div class="avatar-wrapper" id="productImageWrapper" style="cursor: pointer;">
                                <div class="avatar-circle" id="productAvatarCircle">
                                    <i class="fas fa-box" id="productAvatarIcon"></i>
                                    <img id="productAvatarPreview" alt="Imagen del producto"
                                        style="display: none; width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                                </div>
                                <div class="avatar-overlay">
                                    <i class="fas fa-camera"></i>
                                    <span class="avatar-hint">Subir imagen</span>
                                </div>
                            </div>

                            <div class="image-info">
                                <small class="image-hint">
                                    <i class="fas fa-info-circle"></i> Haz clic en la imagen para subir o cambiarla
                                </small>
                                <button type="button" id="removeProductImageBtn" style="display: none;"
                                    class="btn-remove-image">
                                    <i class="fas fa-trash"></i> Eliminar imagen
                                </button>
                            </div>
                        </div>
                    </div>

                    <input type="file" id="productImageInput" accept="image/*" style="display: none;">

                    <form id="productForm">
                        <!-- FILA: Nombre + Marca (sin código) -->
                        <div class="form-row">
                            <div class="form-group">
                                <label for="name">
                                    <i class="fas fa-tag"></i> Nombre <span class="required">*</span>
                                </label>
                                <input type="text" id="name" name="name" placeholder="Ej: Camisa Oxford" required>
                            </div>
                            <div class="form-group">
                                <label for="brand">
                                    <i class="fas fa-building"></i> Marca <span class="required">*</span>
                                </label>
                                <input type="text" id="brand" name="brand" placeholder="Ej: Nike" required>
                            </div>
                        </div>

                        <!-- FILA: Categoría + (sin código) -->
                        <div class="form-row">
                            <div class="form-group">
                                <label for="categoryId">
                                    <i class="fas fa-tags"></i> Categoría
                                </label>
                                <select id="categoryId" name="categoryId">
                                    <option value="">Sin categoría</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <!-- Espacio vacío o podrías poner otro campo, pero lo dejamos vacío para mantener el orden -->
                            </div>
                        </div>

                        <!-- Descripción -->
                        <div class="form-group">
                            <label for="description">
                                <i class="fas fa-align-left"></i> Descripción
                            </label>
                            <textarea id="description" name="description" rows="2"
                                placeholder="Descripción breve del producto..."></textarea>
                        </div>

                        <!-- PRECIOS -->
                        <div class="section-divider">
                            <span><i class="fas fa-dollar-sign"></i> Precios</span>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="price">
                                    <i class="fas fa-tag"></i> Precio venta <span class="required">*</span>
                                </label>
                                <div class="input-with-icon">
                                    <input type="number" id="price" name="price" placeholder="0.00" step="0.01"
                                        required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="cost">
                                    <i class="fas fa-chart-line"></i> Costo compra
                                </label>
                                <div class="input-with-icon">
                                    <input type="number" id="cost" name="cost" placeholder="0.00" step="0.01">
                                </div>
                            </div>
                        </div>

                        <!-- INVENTARIO -->
                        <div class="section-divider">
                            <span><i class="fas fa-boxes"></i> Inventario</span>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="stock">
                                    <i class="fas fa-cubes"></i> Stock inicial
                                </label>
                                <input type="number" id="stock" name="stock" placeholder="0" value="0"
                                    onfocus="if(this.value === '0') this.select();">
                            </div>
                            <div class="form-group">
                                <label for="minStock">
                                    <i class="fas fa-exclamation-triangle"></i> Stock mínimo
                                </label>
                                <input type="number" id="minStock" name="minStock" placeholder="0" value="0"
                                    onfocus="if(this.value === '0') this.select();">
                            </div>
                        </div>

                        <!-- Unidad de medida -->
                        <div class="form-group">
                            <label for="unitOfMeasure">
                                <i class="fas fa-ruler"></i> Unidad de medida
                            </label>
                            <select id="unitOfMeasure" name="unitOfMeasure">
                                <option value="">Selecciona una unidad</option>
                                <option value="pieza">Pieza</option>
                                <option value="kilogramo">Kilogramo</option>
                                <option value="gramo">Gramo</option>
                                <option value="litro">Litro</option>
                                <option value="mililitro">Mililitro</option>
                                <option value="metro">Metro</option>
                                <option value="centimetro">Centímetro</option>
                                <option value="pulgada">Pulgada</option>
                                <option value="yarda">Yarda</option>
                                <option value="par">Par</option>
                                <option value="docena">Docena</option>
                                <option value="caja">Caja</option>
                                <option value="paquete">Paquete</option>
                                <option value="bolsa">Bolsa</option>
                                <option value="botella">Botella</option>
                                <option value="lata">Lata</option>
                                <option value="frasco">Frasco</option>
                                <option value="tubo">Tubo</option>
                                <option value="rollo">Rollo</option>
                                <option value="hoja">Hoja</option>
                                <option value="servicio">Servicio</option>
                                <option value="hora">Hora</option>
                                <option value="dia">Día</option>
                                <option value="mes">Mes</option>
                            </select>
                        </div>

                        <!-- 🆕 CÓDIGO DE BARRAS AL FINAL (antes del botón) -->
                        <div class="form-group" style="margin-top: 1rem;">
                            <label for="barcode">
                                <i class="fas fa-barcode"></i> Código de barras <span class="required">*</span>
                                <small style="font-weight: normal; color: #6b7280; font-size: 0.75rem;">
                                    (Escanea o escribe el código)
                                </small>
                            </label>
                            <input type="text" id="barcode" name="barcode" placeholder="Código único" required>
                        </div>

                        <!-- Botón guardar -->
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Registrar producto
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
