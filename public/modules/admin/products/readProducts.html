<!-- FILE: readProducts.html -->
<div class="credContainer">
    <div class="product-list-container">
        <div class="product-list-card">
            <!-- HEADER -->
            <div class="page-header">
                <h2 class="header-title">
                    <i class="fas fa-boxes"></i> Mis Productos
                </h2>
                <div class="header-actions">
                    <a href="/crearProducto" class="btn btn-primary" id="addNewProductBtn" data-link>
                        <i class="fas fa-plus"></i> Nuevo producto
                    </a>
                </div>
            </div>

            <!-- Filtros -->
            <div class="filters-wrapper">
                <div class="search-wrapper">
                    <input type="text" id="searchProduct" class="search-input"
                        placeholder="Buscar por nombre, código, marca o categoría...">
                </div>
                <div class="status-toggle-wrapper">
                    <span class="status-label">Inactivos</span>
                    <div class="status-filter-switch" id="statusFilterSwitch">
                        <div class="status-filter-slider"></div>
                    </div>
                    <span class="status-label active">Activos</span>
                </div>
            </div>

            <!-- TABLA -->
            <div class="component-table-wrapper desktop-view">
                <table class="component-table product-table">
                    <thead>
                        <tr>
                            <th class="product-col-img">Imagen</th>
                            <th class="product-col-code">Código</th>
                            <th class="product-col-name">Nombre</th>
                            <th class="product-col-brand">Marca</th>
                            <th class="product-col-category">Categoría</th>
                            <th class="product-col-price">Precio</th>
                            <th class="product-col-stock">Stock</th>
                            <th class="product-col-status">Estado</th>
                            <th class="product-col-actions">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody"></tbody>
                </table>
            </div>

            <!-- CARDS -->
            <div id="productCardsContainer" class="mobile-view"></div>

            <!-- Paginación -->
            <div class="pagination-container" id="paginationContainer">
                <div class="pagination-info">
                    <span id="paginationInfo">Mostrando 0 - 0 de 0 productos</span>
                </div>
                <div class="pagination-controls">
                    <button class="btn-pagination" id="prevPageBtn" disabled>
                        <i class="fas fa-chevron-left"></i> Anterior
                    </button>
                    <span class="pagination-current" id="currentPageDisplay">Página 1</span>
                    <button class="btn-pagination" id="nextPageBtn" disabled>
                        Siguiente <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- TEMPLATE TABLA -->
<template id="productRowTemplate">
    <tr>
        <td class="product-col-img">
            <div class="product-img-container"></div>
        </td>
        <td class="product-col-code">
            <div class="middle-block"><span class="product-barcode"></span></div>
        </td>
        <td class="product-col-name">
            <div class="middle-block"><span class="product-name"></span></div>
        </td>
        <td class="product-col-brand">
            <div class="middle-block"><span class="product-brand"></span></div>
        </td>
        <td class="product-col-category">
            <div class="middle-block"><span class="product-category"></span></div>
        </td>
        <td class="product-col-price">
            <div class="middle-block"><span class="product-price"></span></div>
        </td>
        <td class="product-col-stock">
            <div class="middle-block"><span class="product-stock"></span></div>
        </td>
        <td class="product-col-status"><span class="product-status"></span></td>
        <td class="product-col-actions">
            <div class="action-badge">
                <button class="btn-view" title="Ver detalles"><i class="fas fa-eye"></i></button>
                <button class="btn-edit" title="Editar"><i class="fas fa-edit"></i></button>
                <div class="status-switch-wrapper">
                    <div class="status-row-switch" data-product-id="">
                        <div class="status-row-slider"></div>
                    </div>
                </div>
            </div>
        </td>
    </tr>
</template>

<!-- TEMPLATE CARDS -->
<template id="productCardTemplate">
    <div class="product-card-item">
        <div class="product-card-header">
            <div class="product-card-avatar"></div>
            <div class="product-card-title">
                <h4 class="card-name"></h4>
                <small class="card-barcode"></small>
            </div>
        </div>
        <div class="product-card-info">
            <p><i class="fas fa-tag"></i> <span class="card-brand"></span></p>
            <p><i class="fas fa-tags"></i> <span class="card-category"></span></p>
            <p><i class="fas fa-dollar-sign"></i> <span class="card-price"></span></p>
            <p><i class="fas fa-box"></i> <span class="card-stock"></span></p>
        </div>
        <div class="product-card-status">
            <span class="card-status"></span>
        </div>
        <div class="product-card-actions">
            <button class="card-action-icon btn-view" title="Ver detalles"><i class="fas fa-eye"></i> Ver</button>
            <button class="card-action-icon btn-edit" title="Editar"><i class="fas fa-edit"></i> Editar</button>
            <div class="status-switch-wrapper">
                <div class="status-row-switch" data-product-id="">
                    <div class="status-row-slider"></div>
                </div>
            </div>
        </div>
    </div>
</template>

<!-- MODAL -->
<div id="productModal" class="modal-container" style="display: none;">
    <div class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Detalles del producto</h3>
                <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="modal-avatar">
                    <img id="modalAvatar" src="" alt="Avatar" style="display: none;">
                    <i id="modalAvatarIcon" class="fas fa-box"></i>
                </div>
                <div class="modal-info">
                    <p><strong>Código:</strong> <span id="modalBarcode"></span></p>
                    <p><strong>Nombre:</strong> <span id="modalName"></span></p>
                    <p><strong>Marca:</strong> <span id="modalBrand"></span></p>
                    <p><strong>Categoría:</strong> <span id="modalCategory"></span></p>
                    <p><strong>Precio:</strong> <span id="modalPrice"></span></p>
                    <p><strong>Stock:</strong> <span id="modalStock"></span></p>
                    <p><strong>Descripción:</strong> <span id="modalDescription"></span></p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="closeModalBtn">Cerrar</button>
            </div>
        </div>
    </div>
</div>
