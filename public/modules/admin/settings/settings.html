<!-- FILE: settings.html -->
<!-- Configuración - Panel de administrador -->
<div class="settings-container">
    <div class="settings-header">
        <div class="header-icon">
            <i class="fas fa-sliders-h"></i>
        </div>
        <div class="header-title">
            <h1>Configuración</h1>
            <p class="header-subtitle">Administra la configuración de tu cuenta</p>
        </div>
    </div>

    <div class="settings-buttons">
        <!-- Botón 1: Datos de la empresa -->
        <button class="settings-btn" id="companyDataBtn">
            <i class="fas fa-building"></i>
            <div class="btn-content">
                <span class="btn-title">Datos de la empresa</span>
                <span class="btn-desc">Configura la información de tu negocio</span>
            </div>
            <i class="fas fa-chevron-right btn-arrow"></i>
        </button>

        <!-- Botón 2: Preferencias de tema -->
        <button class="settings-btn" id="themeBtn">
            <i class="fas fa-palette"></i>
            <div class="btn-content">
                <span class="btn-title">Preferencias de tema</span>
                <span class="btn-desc">Cambiar entre modo claro y oscuro</span>
            </div>
            <i class="fas fa-chevron-right btn-arrow"></i>
        </button>
    </div>
</div>
