<!-- FILE: createStore.html -->
<!-- Configure store data - Administrator -->
<div class="credContainer">
    <div class="store-container">
        <div class="store-card">
            <!-- Header -->
            <div class="store-create-header">
                <h2>
                    <i class="fas fa-store"></i>
                    Configurar tienda
                </h2>
                <p>Registra los datos de tu negocio</p>
            </div>

            <!-- Wizard steps (2 steps) -->
            <div class="wizard-steps">
                <div class="step-item active" data-step="1">
                    <div class="step-number">1</div>
                    <div class="step-label">Datos del negocio</div>
                </div>
                <div class="step-line"></div>
                <div class="step-item" data-step="2">
                    <div class="step-number">2</div>
                    <div class="step-label">Ubicación</div>
                </div>
            </div>

            <!-- Carousel panels -->
            <div class="carousel-container">

                <!-- ==================================================== -->
                <!-- STEP 1: Business Data (CON IMAGEN) -->
                <!-- ==================================================== -->
                <div class="carousel-panel active" data-panel="1">

                    <!-- Logo Upload - Solo en paso 1 -->
                    <!-- Logo Upload - Solo en paso 1 -->
                    <div class="logo-upload-section">
                        <div class="logo-upload-wrapper" id="logoUploadWrapper">
                            <div class="logo-circle" id="logoCircle">
                                <i class="fas fa-store" id="logoIcon"></i>
                                <img id="logoPreviewImg" alt="Logotipo" style="display: none;">
                            </div>
                            <div class="logo-overlay">
                                <i class="fas fa-camera"></i>
                            </div>
                        </div>
                        <input type="file" id="logoInput" accept="image/*" style="display: none;">

                        <!-- Hint -->
                        <small class="logo-hint">Formatos: JPG, PNG (max 2MB)</small>

                        <!-- Botones - Ambos con la misma clase base -->
                        <div class="logo-actions">
                            <button type="button" class="btn-sm" id="uploadLogoBtn">
                                <i class="fas fa-cloud-upload-alt"></i> Subir logo
                            </button>
                            <button type="button" class="btn-sm" id="removeLogoBtn" style="display: none;">
                                <i class="fas fa-trash"></i> Eliminar
                            </button>
                        </div>
                    </div>
                    <!-- Info Section - Datos del negocio -->
                    <div class="info-section">
                        <div class="info-section-title">
                            <i class="fas fa-building"></i>
                            Información del negocio
                        </div>
                        <div class="info-grid">
                            <div class="info-item full-width">
                                <span class="info-icon"><i class="fas fa-store"></i></span>
                                <div class="info-content">
                                    <label>Nombre del negocio *</label>
                                    <input type="text" id="businessName" placeholder="Ej: Mi Tienda NeoShop"
                                        class="store-input">
                                    <small class="field-note" id="nameNote" style="display: none;">El nombre no se puede
                                        modificar una vez registrado</small>
                                </div>
                            </div>
                            <div class="info-item">
                                <span class="info-icon"><i class="fas fa-id-card"></i></span>
                                <div class="info-content">
                                    <label>RFC *</label>
                                    <input type="text" id="rfc" placeholder="XAXX010101XXX" class="store-input"
                                        maxlength="13">
                                </div>
                            </div>
                            <div class="info-item">
                                <span class="info-icon"><i class="fas fa-phone"></i></span>
                                <div class="info-content">
                                    <label>Teléfono *</label>
                                    <input type="tel" id="businessPhone" placeholder="55 1234 5678" class="store-input">
                                </div>
                            </div>
                            <div class="info-item">
                                <span class="info-icon"><i class="fas fa-envelope"></i></span>
                                <div class="info-content">
                                    <label>Correo de facturación</label>
                                    <input type="email" id="billingEmail" placeholder="facturacion@tutienda.com"
                                        class="store-input">
                                    <small class="field-note">Si es diferente al correo de la cuenta</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ==================================================== -->
                <!-- STEP 2: Location (SIN IMAGEN) -->
                <!-- ==================================================== -->
                <div class="carousel-panel" data-panel="2">
                    <!-- Info Section - Ubicación -->
                    <div class="info-section">
                        <div class="info-section-title">
                            <i class="fas fa-map-marker-alt"></i>
                            Ubicación del negocio
                        </div>
                        <div class="info-grid">
                            <div class="info-item full-width">
                                <span class="info-icon"><i class="fas fa-road"></i></span>
                                <div class="info-content">
                                    <label>Calle *</label>
                                    <input type="text" id="street" placeholder="Calle y número" class="store-input">
                                </div>
                            </div>
                            <div class="info-item">
                                <span class="info-icon"><i class="fas fa-city"></i></span>
                                <div class="info-content">
                                    <label>Colonia</label>
                                    <input type="text" id="neighborhood" placeholder="Colonia" class="store-input">
                                </div>
                            </div>
                            <div class="info-item">
                                <span class="info-icon"><i class="fas fa-mail-bulk"></i></span>
                                <div class="info-content">
                                    <label>Código postal *</label>
                                    <input type="text" id="postalCode" placeholder="Código postal" class="store-input">
                                </div>
                            </div>
                            <div class="info-item">
                                <span class="info-icon"><i class="fas fa-building"></i></span>
                                <div class="info-content">
                                    <label>Ciudad *</label>
                                    <input type="text" id="city" placeholder="Ciudad" class="store-input">
                                </div>
                            </div>
                            <div class="info-item">
                                <span class="info-icon"><i class="fas fa-landmark"></i></span>
                                <div class="info-content">
                                    <label>Estado *</label>
                                    <input type="text" id="state" placeholder="Estado" class="store-input">
                                </div>
                            </div>
                            <div class="info-item full-width">
                                <span class="info-icon"><i class="fas fa-pen-alt"></i></span>
                                <div class="info-content">
                                    <label>Referencias adicionales</label>
                                    <textarea id="locationRefs" rows="2"
                                        placeholder="Ej: Entre calles, cerca del metro..."
                                        class="store-textarea"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ======================================================== -->
            <!-- NAVIGATION - Abajo de todo -->
            <!-- ======================================================== -->
            <div class="navigation-container">
                <!-- Step indicator -->
                <div class="step-indicator">
                    <span class="step-dot active" data-step="1"></span>
                    <span class="step-dot" data-step="2"></span>
                    <span class="step-text">Paso <span id="currentStepDisplay">1</span> de 2</span>
                </div>

                <!-- Navigation buttons -->
                <div class="nav-buttons">
                    <button type="button" class="btn btn-secondary btn-nav" id="prevBtn" disabled>
                        <i class="fas fa-arrow-left"></i> Anterior
                    </button>
                    <button type="button" class="btn btn-primary btn-nav btn-nav-next" id="nextBtn">
                        Siguiente <i class="fas fa-arrow-right"></i>
                    </button>
                    <!-- Action Buttons (hidden by default, shown on step 2) -->
                    <div class="action-buttons" id="actionButtons" style="display: none;">
                        <button type="button" id="saveBtn" class="btn btn-primary">
                            <i class="fas fa-save"></i> Guardar configuración
                        </button>
                        <button type="button" id="cancelBtn" class="btn btn-secondary" style="display: none;">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
