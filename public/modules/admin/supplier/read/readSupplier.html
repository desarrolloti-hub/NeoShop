<!-- FILE: supplierList.html -->
<div class="credContainer">
    <div class="supplier-list-container">
        <div class="supplier-list-card">
            <div class="list-header">
                <h2><i class="fas fa-truck"></i> Mis Proveedores</h2>
                <a href="/crearProveedor" class="btn btn-primary" id="addNewSupplierBtn" data-link>
                    <i class="fas fa-plus"></i> Nuevo proveedor
                </a>
            </div>

            <!-- Filtros: Buscador + Toggle de estado -->
            <div class="filters-wrapper">
                <div class="search-wrapper">
                    <input type="text" id="searchSupplier" class="search-input" placeholder="Buscar por nombre, RFC o correo...">
                </div>
                
                <!-- Toggle Switch para mostrar activos/inactivos -->
                <div class="status-toggle-wrapper">
                    <span class="status-label">Inactivos</span>
                    <div class="status-filter-switch" id="statusFilterSwitch">
                        <div class="status-filter-slider"></div>
                    </div>
                    <span class="status-label active">Activos</span>
                </div>
            </div>

            <!-- TABLA -->
            <div class="component-table-wrapper desktop-view">
                <table class="component-table">
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Razón social</th>
                            <th>Teléfono</th>
                            <th>Correo</th>
                            <th>RFC</th>
                            <th>Estado</th>
                            <th>Activar/Desactivar</th>
                        </tr>
                    </thead>
                    <tbody id="supplierTableBody"></tbody>
                </table>
            </div>

            <!-- CARDS -->
            <div id="supplierCardsContainer" class="mobile-view"></div>

            <div class="list-footer">
                <p class="total-count" id="totalSuppliersCount">Total: 0 proveedores</p>
            </div>
        </div>
    </div>
</div>

<!-- TEMPLATE TABLA -->
<template id="supplierRowTemplate">
    <tr>
        <td class="supplier-img-container"></td>
        <td><div class="middle-block"><span class="supplier-name"></span></div></td>
        <td><div class="middle-block"><span class="supplier-business-name"></span></div></td>
        <td><div class="middle-block"><span class="supplier-phone"></span></div></td>
        <td><div class="middle-block"><span class="supplier-email"></span></div></td>
        <td><div class="middle-block"><span class="supplier-rfc"></span></div></td>
        <td><span class="supplier-status"></span></td>
        <td>
            <div class="action-badge">
                <button class="btn-view" title="Ver detalles"><i class="fas fa-eye"></i></button>
                <button class="btn-edit" title="Editar"><i class="fas fa-edit"></i></button>
                <div class="status-switch-wrapper">
                    <div class="status-row-switch" data-supplier-id="">
                        <div class="status-row-slider"></div>
                    </div>
                </div>
            </div>
        </td>
    </tr>
</template>

<!-- TEMPLATE CARDS -->
<template id="supplierCardTemplate">
    <div class="supplier-card-item">
        <div class="supplier-card-header">
            <div class="supplier-card-avatar"></div>
            <div class="supplier-card-title">
                <h4 class="card-name"></h4>
                <small class="card-business-name"></small>
            </div>
        </div>
        <div class="supplier-card-info">
            <p><i class="fas fa-phone"></i> <span class="card-phone"></span></p>
            <p><i class="fas fa-envelope"></i> <span class="card-email"></span></p>
            <p><i class="fas fa-id-card"></i> <span class="card-rfc"></span></p>
        </div>
        <div class="supplier-card-status">
            <span class="card-status"></span>
        </div>
        <div class="supplier-card-actions">
            <button class="card-action-icon btn-view" title="Ver detalles"><i class="fas fa-eye"></i> Ver</button>
            <button class="card-action-icon btn-edit" title="Editar"><i class="fas fa-edit"></i> Editar</button>
            <div class="status-switch-wrapper">
                <div class="status-row-switch" data-supplier-id="">
                    <div class="status-row-slider"></div>
                </div>
            </div>
        </div>
    </div>
</template>

<!-- MODAL -->
<div id="supplierModal" class="modal-container" style="display: none;">
    <div class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Detalles del proveedor</h3>
                <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="modal-avatar">
                    <img id="modalAvatar" src="" alt="Avatar" style="display: none;">
                    <i id="modalAvatarIcon" class="fas fa-store"></i>
                </div>
                <div class="modal-info">
                    <p><strong>Nombre:</strong> <span id="modalNombre"></span></p>
                    <p><strong>Razón social:</strong> <span id="modalRazonSocial"></span></p>
                    <p><strong>Teléfono:</strong> <span id="modalTelefono"></span></p>
                    <p><strong>Teléfono alterno:</strong> <span id="modalTelefonoAlterno"></span></p>
                    <p><strong>Dirección fiscal:</strong> <span id="modalDireccion"></span></p>
                    <p><strong>Correo:</strong> <span id="modalCorreo"></span></p>
                    <p><strong>RFC:</strong> <span id="modalRfc"></span></p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="closeModalBtn">Cerrar</button>
            </div>
        </div>
    </div>
</div>
