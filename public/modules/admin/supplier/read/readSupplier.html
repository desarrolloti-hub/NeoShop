<!-- FILE: supplierList.html -->
<div class="credContainer">
    <!-- HEADER -->
    <div class="page-header">
        <h2 class="header-title">
            <i class="fas fa-truck"></i> Mis Proveedores
        </h2>
        <div class="header-actions">
            <a href="/crearProveedor" class="btn btn-primary" data-link>
                <i class="fas fa-plus"></i> Nueva Proveedor
            </a>
        </div>
    </div>
    <div class="supplier-list-container">
        <div class="supplier-list-card">
            <!-- Filtros: Buscador + Toggle de estado -->
            <div class="filters-wrapper">
                <div class="search-wrapper">
                    <input type="text" id="searchSupplier" class="search-input"
                        placeholder="Buscar proveedor por nombre, RFC o correo...">
                </div>

                <div class="status-toggle-wrapper">
                    <span class="status-label">Inactivos</span>
                    <div class="status-filter-switch" id="statusFilterSwitch">
                        <div class="status-filter-slider"></div>
                    </div>
                    <span class="status-label active">Activos</span>
                </div>
            </div>

            <!-- TABLA - Usando component-table -->
            <div class="component-table-wrapper desktop-view">
                <table class="component-table">
                    <thead>
                        <tr>
                            <th>Proveedor</th>
                            <th>Contacto</th>
                            <th>RFC</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="supplierTableBody"></tbody>
                </table>
            </div>

            <!-- CARDS MÓVIL -->
            <div id="supplierCardsContainer" class="mobile-view"></div>

            <!-- Paginación -->
            <div class="pagination-container" id="paginationContainer">
                <div class="pagination-info">
                    <span id="paginationInfo">Mostrando 0 - 0 de 0 proveedores</span>
                </div>
                <div class="pagination-controls">
                    <button class="btn-pagination" id="prevPageBtn" disabled>
                        <i class="fas fa-chevron-left"></i> Anterior
                    </button>
                    <span class="pagination-current" id="currentPageDisplay">Página 1</span>
                    <button class="btn-pagination" id="nextPageBtn" disabled>
                        Siguiente <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- TEMPLATE TABLA -->
<template id="supplierRowTemplate">
    <tr>
        <td>
            <div class="supplier-info-cell">
                <div class="supplier-avatar">
                    <img class="supplier-avatar-img" src="" alt="" style="display: none;">
                    <i class="fas fa-store supplier-avatar-icon"></i>
                </div>
                <div class="supplier-info">
                    <div class="supplier-name"></div>
                    <div class="supplier-business-name"></div>
                </div>
            </div>
        </td>
        <td>
            <div class="contact-info">
                <div class="contact-item">
                    <i class="fas fa-phone"></i>
                    <span class="supplier-phone"></span>
                </div>
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <span class="supplier-email"></span>
                </div>
            </div>
        </td>
        <td>
            <span class="supplier-rfc"></span>
        </td>
        <td>
            <span class="supplier-status"></span>
        </td>
        <td>
            <div class="action-badge">
                <button class="btn-view" title="Ver detalles"><i class="fas fa-eye"></i></button>
                <button class="btn-edit" title="Editar"><i class="fas fa-edit"></i></button>
                <div class="status-switch-wrapper">
                    <div class="status-row-switch" data-supplier-id="">
                        <div class="status-row-slider"></div>
                    </div>
                </div>
            </div>
        </td>
    </tr>
</template>

<!-- TEMPLATE CARDS MÓVIL -->
<template id="supplierCardTemplate">
    <div class="supplier-card-item">
        <div class="supplier-card-header">
            <div class="supplier-card-avatar">
                <img class="supplier-card-img" src="" alt="" style="display: none;">
                <i class="fas fa-store"></i>
            </div>
            <div class="supplier-card-title">
                <h4 class="card-name"></h4>
                <span class="card-business-name"></span>
            </div>
            <span class="card-status"></span>
        </div>
        <div class="supplier-card-body">
            <div class="card-contact">
                <div class="contact-item">
                    <i class="fas fa-phone"></i>
                    <span class="card-phone"></span>
                </div>
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <span class="card-email"></span>
                </div>
                <div class="contact-item">
                    <i class="fas fa-id-card"></i>
                    <span class="card-rfc"></span>
                </div>
            </div>
        </div>
        <div class="supplier-card-actions">
            <button class="btn-action btn-view" title="Ver detalles">
                <i class="fas fa-eye"></i> Ver
            </button>
            <button class="btn-action btn-edit" title="Editar">
                <i class="fas fa-edit"></i> Editar
            </button>
            <div class="status-switch-wrapper">
                <div class="status-row-switch" data-supplier-id="">
                    <div class="status-row-slider"></div>
                </div>
            </div>
        </div>
    </div>
</template>

<!-- MODAL -->
<div id="supplierModal" class="modal-container" style="display: none;">
    <div class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Detalles del proveedor</h3>
                <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="modal-avatar">
                    <img id="modalAvatar" src="" alt="Avatar" style="display: none;">
                    <i id="modalAvatarIcon" class="fas fa-store"></i>
                </div>
                <div class="modal-info">
                    <p><strong>Nombre:</strong> <span id="modalName"></span></p>
                    <p><strong>Razón social:</strong> <span id="modalBusinessName"></span></p>
                    <p><strong>Teléfono:</strong> <span id="modalPhone"></span></p>
                    <p><strong>Teléfono alterno:</strong> <span id="modalAlternatePhone"></span></p>
                    <p><strong>Dirección fiscal:</strong> <span id="modalAddress"></span></p>
                    <p><strong>Correo:</strong> <span id="modalEmail"></span></p>
                    <p><strong>RFC:</strong> <span id="modalRfc"></span></p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="closeModalBtn">Cerrar</button>
            </div>
        </div>
    </div>
</div>
