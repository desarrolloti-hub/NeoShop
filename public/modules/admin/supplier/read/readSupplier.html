<!-- FILE: supplierList.html -->
<!-- Suppliers list view - usando componentes universales -->

<div class="supplier-list-container">
    <div class="supplier-list-card">
        <div class="list-header">
            <h2><i class="fas fa-truck"></i> Mis Proveedores</h2>
            <!-- 🔥 CAMBIO: de button a link con ruta /createSupplier 🔥 -->
            <a href="/createSupplier" class="btn btn-primary" id="addNewSupplierBtn" data-link>
                <i class="fas fa-plus"></i> Nuevo proveedor
            </a>
        </div>

        <!-- TABLA - visible en escritorio -->
        <div class="component-table-wrapper desktop-view">
            <table class="component-table">
                <thead>
                    <tr>
                        <th>Imagen</th>
                        <th>Nombre</th>
                        <th>Razón social</th>
                        <th>Teléfono</th>
                        <th>Correo</th>
                        <th>RFC</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="supplierTableBody"></tbody>
            </table>
        </div>

        <!-- CARDS - visible en móvil -->
        <div id="supplierCardsContainer" class="mobile-view"></div>

        <div class="list-footer">
            <p class="total-count" id="totalSuppliersCount">Total: 0 proveedores</p>
        </div>
    </div>
</div>

<!-- TEMPLATES para clonar desde JS -->
<template id="supplierRowTemplate">
    <tr>
        <td class="direct-text">
            <i class="fas fa-store supplier-table-icon"></i>
        </td>
        <td><div class="middle-block"><span class="supplier-name"></span></div></td>
        <td><div class="middle-block"><span class="supplier-business-name"></span></div></td>
        <td><div class="middle-block"><span class="supplier-phone"></span></div></td>
        <td><div class="middle-block"><span class="supplier-email"></span></div></td>
        <td><div class="middle-block"><span class="supplier-rfc"></span></div></td>
        <td>
            <div class="action-badge">
                <button class="btn-view" data-action="view" title="Ver detalles"><i class="fas fa-eye"></i></button>
                <button class="btn-edit" data-action="edit" title="Editar"><i class="fas fa-edit"></i></button>
                <button class="btn-delete" data-action="delete" title="Eliminar"><i class="fas fa-trash-alt"></i></button>
            </div>
        </td>
    </tr>
</template>

<template id="supplierCardTemplate">
    <div class="supplier-card-item">
        <div class="supplier-card-header">
            <div class="supplier-card-avatar">
                <i class="fas fa-store"></i>
            </div>
            <div class="supplier-card-title">
                <h4 class="card-name"></h4>
                <small class="card-business-name"></small>
            </div>
        </div>
        <div class="supplier-card-actions">
            <button class="card-action-icon btn-view" data-action="view" title="Ver detalles">
                <i class="fas fa-eye"></i>
            </button>
            <button class="card-action-icon btn-edit" data-action="edit" title="Editar">
                <i class="fas fa-edit"></i>
            </button>
            <button class="card-action-icon btn-delete" data-action="delete" title="Eliminar">
                <i class="fas fa-trash-alt"></i>
            </button>
        </div>
    </div>
</template>

<!-- MODAL para detalles -->
<div id="supplierModal" class="modal-container" style="display: none;">
    <div class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Detalles del proveedor</h3>
                <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="modal-avatar">
                    <img id="modalAvatar" src="" alt="Avatar" style="display: none;">
                    <i id="modalAvatarIcon" class="fas fa-store"></i>
                </div>
                <div class="modal-info">
                    <p><strong>Nombre:</strong> <span id="modalNombre"></span></p>
                    <p><strong>Razón social:</strong> <span id="modalRazonSocial"></span></p>
                    <p><strong>Teléfono:</strong> <span id="modalTelefono"></span></p>
                    <p><strong>Teléfono alterno:</strong> <span id="modalTelefonoAlterno"></span></p>
                    <p><strong>Dirección fiscal:</strong> <span id="modalDireccion"></span></p>
                    <p><strong>Correo:</strong> <span id="modalCorreo"></span></p>
                    <p><strong>RFC:</strong> <span id="modalRfc"></span></p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="closeModalBtn">Cerrar</button>
            </div>
        </div>
    </div>
</div>
