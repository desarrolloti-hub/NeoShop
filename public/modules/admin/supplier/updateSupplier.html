<div class="credContainer">
    <div class="page-header">
        <h2 class="header-title">
            <i class="fas fa-edit"></i> Editar Proveedor
        </h2>
        <div class="header-actions">
            <a href="/proveedores" class="btn-header btn-header-secondary" id="backToListBtn" data-link>
                <i class="fas fa-arrow-left"></i> Volver al listado
            </a>
        </div>
    </div>
    <div class="supplier-create-container">
        <div class="supplier-create-form-container">
            <div class="supplier-create-body">
                <form id="updateSupplierForm">
                    <!-- Foto del proveedor -->
                    <div class="create-photo-section">
                        <div class="create-photo-preview" id="supplierPhotoPreview">
                            <i class="fas fa-store"></i>
                        </div>
                        <input type="file" id="supplierImageInput" class="create-photo-input"
                            accept="image/jpeg,image/png,image/jpg,image/webp">
                        <button type="button" id="uploadPhotoBtn" class="btn-secondary btn-upload">
                            <i class="fas fa-upload"></i> Subir foto
                        </button>
                        <p class="photo-help">Opcional. Puedes subir una foto o usar una URL</p>
                        <input type="text" id="photoUrl" placeholder="O pega una URL de imagen aquí"
                            class="photo-url-input">
                    </div>

                    <!-- ID oculto -->
                    <input type="hidden" id="supplierId">

                    <!-- Datos del proveedor -->
                    <div class="create-form-row">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Nombre *</label>
                            <input type="text" id="name" required placeholder="Nombre del responsable">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-building"></i> Razón social *</label>
                            <input type="text" id="businessName" required placeholder="Denominación o razón social">
                        </div>
                    </div>

                    <div class="create-form-row">
                        <div class="form-group">
                            <label><i class="fas fa-id-card"></i> RFC *</label>
                            <input type="text" id="rfc" required placeholder="XAXX010101XXX" maxlength="13">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Teléfono *</label>
                            <input type="tel" id="phone" required placeholder="55 1234 5678">
                        </div>
                    </div>

                    <div class="create-form-row">
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Teléfono alterno</label>
                            <input type="tel" id="alternatePhone" placeholder="55 8765 4321">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Correo electrónico *</label>
                            <input type="email" id="email" required placeholder="proveedor@mail.com">
                        </div>
                    </div>

                    <div class="create-form-row">
                        <div class="form-group full-width">
                            <label><i class="fas fa-map-marker-alt"></i> Dirección fiscal *</label>
                            <input type="text" id="fiscalAddress" required placeholder="Calle, número, colonia, ciudad">
                        </div>
                    </div>

                    <!-- Estado del proveedor -->
                    <div class="create-form-row">
                        <div class="form-group full-width">
                            <label><i class="fas fa-toggle-on"></i> Estado del proveedor</label>
                            <div class="status-toggle-wrapper">
                                <span class="status-label" id="statusLabelInactive">Inactivo</span>
                                <div class="status-filter-switch" id="statusToggle">
                                    <div class="status-filter-slider"></div>
                                </div>
                                <span class="status-label active" id="statusLabelActive">Activo</span>
                            </div>
                            <small class="field-note">Cambia el estado para habilitar o deshabilitar el proveedor en el
                                sistema</small>
                        </div>
                    </div>

                    <!-- Acciones -->
                    <div class="create-form-actions">
                        <button type="button" id="cancelUpdateBtn" class="btn-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                        <button type="submit" id="submitUpdateBtn" class="btn-primary">
                            <i class="fas fa-save"></i> Actualizar proveedor
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
