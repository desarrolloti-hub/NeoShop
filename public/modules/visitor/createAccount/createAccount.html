<div class="auth-container">
    <div class="register-card">
        <!-- Foto de perfil -->
        <div class="avatar-wrapper">
            <div class="avatar-circle" id="avatarCircle">
                <i class="fas fa-user" id="avatarIcon"></i>
                <img id="avatarPreview" alt="Foto de perfil">
            </div>
            <div class="avatar-overlay">
                <i class="fas fa-camera"></i>
            </div>
        </div>

        <input type="file" id="profileImage" accept="image/*">
        <button type="button" id="removeImageBtn" style="display: none;">
            <i class="fas fa-trash"></i> Eliminar foto
        </button>

        <h2>Crear cuenta</h2>

        <form id="registerForm">
            <div class="name-row">
                <input type="text" placeholder="Nombre" id="firstName" required class="name-input">
                <input type="text" placeholder="Apellido" id="lastName" required class="name-input">
            </div>
            <input type="email" placeholder="Correo electrónico" id="email" required>
            <input type="password" placeholder="Contraseña" id="password" required>

            <!-- ✅ NUEVO: Checkbox de términos y condiciones -->
            <div class="terms-checkbox-wrapper">
                <label class="terms-label">
                    <input type="checkbox" id="termsCheckbox" required>
                    <span class="checkmark"></span>
                    <span class="terms-text">
                        Acepto los <a href="/terminosYCondiciones" target="_blank" id="termsLink">términos y condiciones</a>
                    </span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
                Crear cuenta <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <!-- DIVISOR Y BOTON DE GOOGLE -->
        <div class="auth-divider">
            <span>O</span>
        </div>

        <button type="button" class="btn-google" id="googleRegisterBtn">
            <i class="fab fa-google"></i>
            Crear cuenta con Google
        </button>

        <div class="register-links">
            <p>¿Ya tienes cuenta? <span><a href="iniciarSesion">Inicia Sesion</a></span></p>
        </div>
    </div>
</div>
