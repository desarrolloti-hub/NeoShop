<div class="woCredContainer">
    <div class="auth-container">
        <div class="login-card">
            <i class="fas fa-user"></i>
            <h2>Iniciar sesión</h2>

            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="loginUser" placeholder="Correo electrónico" required>
                </div>

                <!-- Password con ojito -->
                <div class="password-wrapper">
                    <input type="password" id="loginPass" placeholder="Contraseña" required>
                    <button type="button" class="password-toggle" id="toggleLoginPassword" tabindex="0"
                        aria-label="Mostrar contraseña">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <button type="submit" class="btn btn-primary">
                    Ingresar <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- DIVISOR Y BOTÓN DE GOOGLE -->
            <div class="auth-divider">
                <span>O</span>
            </div>

            <button type="button" class="btn-google" id="googleLoginBtn">
                <i class="fab fa-google"></i>
                Iniciar sesión con Google
            </button>

            <div class="login-links">
                <a href="#">¿Olvidaste tu contraseña?</a>
                <p>¿No tienes cuenta?
                    <span id="goRegister">
                        <a href="crearCuenta">Regístrate</a>
                    </span>
                </p>
            </div>
        </div>
    </div>
</div>
